<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas - Práctica Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="auth-container" class="card">
            <h2 id="auth-title">Iniciar Sesión</h2>
            <form id="auth-form" onsubmit="handleAuth(event)">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="ejemplo@correo.com">
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="******">
                </div>
                <button type="submit" id="btn-primary" class="btn">Ingresar</button>
            </form>
            <p class="toggle-text">
                ¿No tienes una cuenta? <span id="toggle-auth" onclick="toggleAuthMode()">Regístrate aquí</span>
            </p>
        </div>

        <div id="dashboard-container" class="card" style="display: none;">
            <div class="dashboard-header">
                <h2>Panel de Tareas</h2>
                <button onclick="logout()" class="btn btn-danger">Cerrar Sesión</button>
            </div>
            <p class="welcome-user">Bienvenido: <strong id="user-display"></strong></p>

            <form id="task-form" onsubmit="handleCreateTask(event)">
                <div class="task-input-group">
                    <input type="text" id="task-title" required placeholder="Escribe una nueva tarea...">
                    <button type="submit" class="btn btn-success">Agregar</button>
                </div>
            </form>

            <h3>Mis Tareas Pendientes</h3>
            <ul id="task-list" class="task-list">
                </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
